# Evolution API v1 (sem PostgreSQL/Redis). Use v1 para subir sem banco externo.
# "latest" = v2 e exige PostgreSQL + Redis; por isso usamos tag v1 explicitamente.
# Volumes garantem PERSISTÊNCIA das sessões WhatsApp após reinício.
services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      AUTHENTICATION_TYPE: apikey
      # Garante que o container use a mesma chave do .env (Compose substitui ao subir)
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      SERVER_URL: http://localhost:8080
      CORS_ORIGIN: "*"
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

volumes:
  evolution_store:
  evolution_instances:
